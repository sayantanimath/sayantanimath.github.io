<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-image: url("IMG_2778.png");
             background-size: cover;      /* fills the entire screen */
        background-position: center; /* keeps image centered */
        background-repeat: no-repeat;
        background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            padding-top: 120px;
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        h1 {
            margin-bottom: 10px;
        }

        p {
            margin-bottom: 30px;
        }

        .button-container {
            display: flex;
            gap: 60px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .portfolio-button {
            padding: 30px 70px;
            font-size: 1.6rem;
            font-weight: bold;
            text-decoration: none;
            color: white;
            background-color: #4a7bb7;
            border-radius: 10px;
            transition: 0.3s;
        }

        .portfolio-button:hover {
            background-color: #345d8c;
            transform: translateY(-3px);
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="button-container">
            <a href="art.html" class="portfolio-button">ART</a>
            <a href="photography.html" class="portfolio-button">PHOTOGRAPHY</a>
        </div>
    </div>
</body>
</html>
